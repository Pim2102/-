<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แฟลชการ์ดคันจิและประโยคตัวอย่าง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Mali', cursive;
            /* Traditional Japanese Asanoha (Hemp Leaf) Pattern Background */
            background-color: #f2efe9;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='103.92304845413263' viewBox='0 0 60 103.92304845413263' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d1caba' fill-opacity='0.4'%3E%3Cpath d='M30 103.923048l-30-51.961524 30-51.961524 30 51.961524zM30 96.994l26-45.033L30 6.928 4 51.961zM30 87.038l19.5-33.774L30 19.488 10.5 53.264zM30 77.081l13-22.516L30 32.049 17 54.565z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            overflow-x: hidden;
            touch-action: pan-y;
        }
        .jp-text {
            font-family: 'Noto Sans JP', sans-serif;
        }
        /* Style for Japanese Ruby characters (Furigana) */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.4em;
            color: #64748b;
            font-weight: 500;
            transform: translateY(-0.2em);
        }

        /* 3D Flip Card CSS */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .is-flipped { transform: rotateY(180deg); }

        .btn-control { transition: all 0.1s ease-in-out; }
        .btn-control:active { transform: scale(0.92); }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-between p-4 md:p-8 relative">

    <header class="relative z-10 w-full max-w-2xl bg-white/95 backdrop-blur-sm shadow-md rounded-2xl p-4 flex justify-between items-center border-b-4 border-emerald-600 mt-2">
        <div>
            <h1 class="text-xl md:text-2xl font-bold text-emerald-800">⛩️ แฟลชการ์ดคันจิ</h1>
            <p class="text-emerald-600 text-sm">คำศัพท์ & ประโยคตัวอย่าง</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-emerald-50 text-emerald-800 font-bold px-4 py-2 rounded-full border border-emerald-200 shadow-sm text-lg">
                <span id="current-index">1</span> / <span id="total-cards">2</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center w-full my-6 relative z-10">
        
        <!-- The Card Container -->
        <div class="perspective-1000 w-full max-w-md md:max-w-lg h-[450px] md:h-[500px] cursor-pointer" id="flashcard-container" onclick="flipCard()">
            <div class="card-inner w-full h-full transform-style-3d relative shadow-2xl rounded-[3rem]" id="flashcard-inner">
                
                <!-- Front Face (Kanji Word) -->
                <div class="absolute w-full h-full backface-hidden bg-white border-8 border-stone-100 rounded-[3rem] flex flex-col items-center justify-center p-8 text-center shadow-inner">
                    
                    <div class="bg-stone-100 text-stone-500 text-sm font-bold px-4 py-1 rounded-full mb-auto mt-2 tracking-wide">
                        ด้านหน้า : คำศัพท์
                    </div>
                    
                    <!-- Dynamic Content Area -->
                    <div class="flex flex-col items-center justify-center flex-1 w-full" id="front-content">
                        <!-- Content injected via JS -->
                    </div>
                    
                    <!-- Dedicated Front Audio Button -->
                    <button onclick="event.stopPropagation(); playAudio('front');" class="mt-auto mb-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-full w-20 h-20 flex items-center justify-center text-4xl shadow-md border border-emerald-200 btn-control transition-colors" title="ฟังเสียงคำศัพท์">
                        🔊
                    </button>
                    <p class="text-stone-400 mt-2 font-semibold text-sm">กดที่การ์ดเพื่อดูประโยคตัวอย่าง</p>
                </div>

                <!-- Back Face (Example Sentence) -->
                <div class="absolute w-full h-full backface-hidden rotate-y-180 bg-gradient-to-br from-emerald-50 to-white border-8 border-emerald-200 rounded-[3rem] flex flex-col items-center justify-center p-8 text-center shadow-inner">
                    
                    <div class="bg-emerald-200 text-emerald-800 text-sm font-bold px-4 py-1 rounded-full mb-auto mt-2 tracking-wide">
                        ด้านหลัง : ประโยคตัวอย่าง
                    </div>
                    
                    <!-- Dynamic Content Area -->
                    <div class="flex flex-col items-center justify-center flex-1 w-full" id="back-content">
                        <!-- Content injected via JS -->
                    </div>
                    
                    <!-- Dedicated Back Audio Button -->
                    <button onclick="event.stopPropagation(); playAudio('back');" class="mt-auto mb-2 bg-white hover:bg-emerald-50 text-emerald-600 rounded-full w-20 h-20 flex items-center justify-center text-4xl shadow-md border border-emerald-200 btn-control transition-colors" title="ฟังเสียงประโยค">
                        🗣️
                    </button>
                    <p class="text-emerald-500 mt-2 font-semibold text-sm">กดที่การ์ดเพื่อพลิกกลับ</p>
                </div>

            </div>
        </div>

    </main>

    <!-- Controls Layout -->
    <div class="relative z-10 w-full max-w-md flex justify-between items-center mb-8 gap-4 px-4">
        <button onclick="prevCard()" class="btn-control bg-white text-emerald-700 border-2 border-emerald-200 w-16 h-16 md:w-20 md:h-20 rounded-full shadow-lg flex items-center justify-center text-3xl md:text-4xl hover:bg-emerald-50">
            ◀
        </button>
        
        <button onclick="flipCard()" class="btn-control bg-emerald-600 text-white border-b-4 border-emerald-800 px-6 py-4 rounded-2xl shadow-lg font-bold text-xl md:text-2xl flex-1 flex items-center justify-center hover:bg-emerald-500">
            🔄 พลิกการ์ด
        </button>
        
        <button onclick="nextCard()" class="btn-control bg-white text-emerald-700 border-2 border-emerald-200 w-16 h-16 md:w-20 md:h-20 rounded-full shadow-lg flex items-center justify-center text-3xl md:text-4xl hover:bg-emerald-50">
            ▶
        </button>
    </div>

    <script>
        // Data for Kanji Flashcards
        const flashcards = [
            {
                // Card 1
                frontHTML: `<h2 class="text-7xl md:text-8xl font-black text-stone-800 jp-text mb-6 leading-tight">
                                <ruby>日<rt>にち</rt></ruby><ruby>曜<rt>よう</rt></ruby><ruby>日<rt>び</rt></ruby>
                            </h2>
                            <p class="text-3xl font-bold text-emerald-600 mb-2">วันอาทิตย์</p>`,
                frontAudioText: "日曜日",
                
                backHTML: `<h3 class="text-3xl md:text-4xl font-bold text-stone-800 jp-text mb-6 leading-relaxed text-left w-full">
                                <ruby>日曜日<rt>にちようび</rt></ruby>は いつも なにを していますか。
                           </h3>
                           <div class="bg-white px-5 py-4 rounded-xl shadow-sm border border-emerald-100 w-full text-left">
                               <p class="text-stone-600 text-lg font-medium">"วันอาทิตย์คุณทำอะไรอยู่เสมอๆ?"</p>
                           </div>`,
                backAudioText: "日曜日はいつもなにをしていますか。"
            },
            {
                // Card 2
                frontHTML: `<h2 class="text-7xl md:text-8xl font-black text-stone-800 jp-text mb-6 leading-tight">
                                <ruby>男<rt>おとこ</rt></ruby>の<ruby>人<rt>ひと</rt></ruby>
                            </h2>
                            <p class="text-3xl font-bold text-emerald-600 mb-2">ผู้ชาย</p>`,
                frontAudioText: "男の人",
                
                backHTML: `<h3 class="text-3xl md:text-4xl font-bold text-stone-800 jp-text mb-6 leading-relaxed text-left w-full">
                                かれは とても しんせつな <ruby>男<rt>おとこ</rt></ruby>の<ruby>人<rt>ひと</rt></ruby> です。
                           </h3>
                           <div class="bg-white px-5 py-4 rounded-xl shadow-sm border border-emerald-100 w-full text-left">
                               <p class="text-stone-600 text-lg font-medium">"เขาเป็นผู้ชายที่ใจดีมากๆ"</p>
                           </div>`,
                backAudioText: "かれわとてもしんせつな男の人です。"
            },
            {
                // Card 3: 本
                frontHTML: `<h2 class="text-7xl md:text-8xl font-black text-stone-800 jp-text mb-6 leading-tight">
                                <ruby>本<rt>ほん</rt></ruby>
                            </h2>
                            <p class="text-3xl font-bold text-emerald-600 mb-2">หนังสือ</p>`,
                frontAudioText: "本",
                
                backHTML: `<h3 class="text-3xl md:text-4xl font-bold text-stone-800 jp-text mb-6 leading-relaxed text-left w-full">
                                <ruby>図<rt>と</rt></ruby><ruby>書<rt>しょ</rt></ruby><ruby>館<rt>かん</rt></ruby>で<ruby>本<rt>ほん</rt></ruby>を<ruby>借<rt>か</rt></ruby>りました。
                           </h3>
                           <div class="bg-white px-5 py-4 rounded-xl shadow-sm border border-emerald-100 w-full text-left">
                               <p class="text-stone-600 text-lg font-medium">"ฉันยืมหนังสือที่ห้องสมุด"</p>
                           </div>`,
                backAudioText: "図書館で本を借りました。"
            },
            {
                // Card 4: 母
                frontHTML: `<h2 class="text-7xl md:text-8xl font-black text-stone-800 jp-text mb-6 leading-tight">
                                <ruby>母<rt>はは</rt></ruby>
                            </h2>
                            <p class="text-3xl font-bold text-emerald-600 mb-2">แม่</p>`,
                frontAudioText: "母",
                
                backHTML: `<h3 class="text-3xl md:text-4xl font-bold text-stone-800 jp-text mb-6 leading-relaxed text-left w-full">
                                <ruby>母<rt>はは</rt></ruby>は<ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>が<ruby>上<rt>じょう</rt></ruby><ruby>手<rt>ず</rt></ruby>です。
                           </h3>
                           <div class="bg-white px-5 py-4 rounded-xl shadow-sm border border-emerald-100 w-full text-left">
                               <p class="text-stone-600 text-lg font-medium">"แม่ของฉันทำอาหารเก่ง"</p>
                           </div>`,
                backAudioText: "母は料理が上手です。"
            },
            {
                // Card 5: 木星
                frontHTML: `<h2 class="text-7xl md:text-8xl font-black text-stone-800 jp-text mb-6 leading-tight">
                                <ruby>木<rt>もく</rt></ruby><ruby>星<rt>せい</rt></ruby>
                            </h2>
                            <p class="text-3xl font-bold text-emerald-600 mb-2">ดาวพฤหัสบดี</p>`,
                frontAudioText: "木星",
                
                backHTML: `<h3 class="text-3xl md:text-4xl font-bold text-stone-800 jp-text mb-6 leading-relaxed text-left w-full">
                                <ruby>木<rt>もく</rt></ruby><ruby>星<rt>せい</rt></ruby>は<ruby>地<rt>ち</rt></ruby><ruby>球<rt>きゅう</rt></ruby>より<ruby>大<rt>おお</rt></ruby>きいです。
                           </h3>
                           <div class="bg-white px-5 py-4 rounded-xl shadow-sm border border-emerald-100 w-full text-left">
                               <p class="text-stone-600 text-lg font-medium">"ดาวพฤหัสบดีใหญ่กว่าโลก"</p>
                           </div>`,
                backAudioText: "木星は地球より大きいです。"
            }
        ];

        let currentIndex = 0;
        let isFlipped = false;
        
        const audios = {
            front: [],
            back: []
        };

        // Preload audios for native Japanese accent
        flashcards.forEach((card, index) => {
            const frontUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(card.frontAudioText)}&tl=ja&client=tw-ob`;
            const backUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(card.backAudioText)}&tl=ja&client=tw-ob`;
            
            audios.front[index] = new Audio(frontUrl);
            audios.back[index] = new Audio(backUrl);
        });

        const cardInner = document.getElementById('flashcard-inner');
        const frontContent = document.getElementById('front-content');
        const backContent = document.getElementById('back-content');

        function updateUI() {
            const card = flashcards[currentIndex];
            
            // Insert HTML content (supports <ruby> tags)
            frontContent.innerHTML = card.frontHTML;
            backContent.innerHTML = card.backHTML;
            
            // Update Counter
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-cards').innerText = flashcards.length;
        }

        function flipCard() {
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardInner.classList.add('is-flipped');
            } else {
                cardInner.classList.remove('is-flipped');
            }
        }

        function nextCard() {
            if (isFlipped) {
                flipCard();
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % flashcards.length;
                    updateUI();
                }, 300);
            } else {
                currentIndex = (currentIndex + 1) % flashcards.length;
                updateUI();
            }
        }

        function prevCard() {
            if (isFlipped) {
                flipCard();
                setTimeout(() => {
                    currentIndex = (currentIndex - 1 + flashcards.length) % flashcards.length;
                    updateUI();
                }, 300);
            } else {
                currentIndex = (currentIndex - 1 + flashcards.length) % flashcards.length;
                updateUI();
            }
        }

        function playAudio(side) {
            const audioArr = side === 'front' ? audios.front : audios.back;
            const textToSpeak = side === 'front' ? flashcards[currentIndex].frontAudioText : flashcards[currentIndex].backAudioText;
            const audioObj = audioArr[currentIndex];

            if (audioObj) {
                audioObj.currentTime = 0;
                audioObj.play().catch(e => {
                    console.warn("Falling back to Web Speech API", e);
                    // Fallback to Web Speech API if Google TTS is blocked by browser policies
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(textToSpeak);
                        utterance.lang = 'ja-JP';
                        utterance.rate = 0.9; // Slightly slower for better comprehension of sentences
                        window.speechSynthesis.speak(utterance);
                    }
                });
            }
        }

        let touchStartX = 0;
        let touchEndX = 0;
        const flashcardContainer = document.getElementById('flashcard-container');

        flashcardContainer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        flashcardContainer.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 50; 
            if (touchEndX < touchStartX - swipeThreshold) {
                nextCard(); // Swipe Left
            }
            if (touchEndX > touchStartX + swipeThreshold) {
                prevCard(); // Swipe Right
            }
        }

        // Initialize on load
        window.onload = () => {
            updateUI();
        };

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight') nextCard();
            if(e.key === 'ArrowLeft') prevCard();
            if(e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                flipCard();
            }
        });

    </script>
</body>
</html>
